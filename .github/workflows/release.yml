name: Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Disable cache (不使用缓存)'
        type: boolean
        required: false
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Pub dependencies
        if: ${{ github.event.inputs.no_cache != 'true' }}
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PUB_CACHE }}
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle packages
        if: ${{ github.event.inputs.no_cache != 'true' }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/**/version.properties
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Write Android signing files
        shell: bash
        env:
          KEY_STORE_BASE64: ${{ secrets.KEY_STORE_BASE64 || secrets.KEYSTORE_B64 }}
          KEY_STORE_TYPE: ${{ secrets.KEY_STORE_TYPE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || secrets.KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$KEY_STORE_BASE64" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ] || [ -z "$STORE_PASSWORD" ]; then
            echo "Signing secrets not configured. Please configure one of KEY_STORE_BASE64/KEYSTORE_B64, KEY_ALIAS, KEY_PASSWORD, and one of STORE_PASSWORD/KEYSTORE_PASSWORD in repository secrets."
            exit 1
          fi

          mkdir -p android/app
          printf '%s' "$KEY_STORE_BASE64" | base64 --decode > android/app/keystore.src

          DETECTED_STORE_TYPE=""
          if [ -n "$KEY_STORE_TYPE" ]; then
            DETECTED_STORE_TYPE="$KEY_STORE_TYPE"
          else
            if keytool -list -keystore android/app/keystore.src -storetype PKCS12 -storepass "$STORE_PASSWORD" >/dev/null 2>&1; then
              DETECTED_STORE_TYPE="PKCS12"
            elif keytool -list -keystore android/app/keystore.src -storetype JKS -storepass "$STORE_PASSWORD" >/dev/null 2>&1; then
              DETECTED_STORE_TYPE="JKS"
            fi
          fi

          if [ -z "$DETECTED_STORE_TYPE" ]; then
            echo "Could not detect keystore type (PKCS12/JKS)." >&2
            exit 1
          fi

          if [ "$DETECTED_STORE_TYPE" = "PKCS12" ]; then
            keytool -importkeystore \
              -srckeystore android/app/keystore.src \
              -srcstoretype PKCS12 \
              -srcstorepass "$STORE_PASSWORD" \
              -destkeystore android/app/keystore.jks \
              -deststoretype JKS \
              -deststorepass "$STORE_PASSWORD" \
              -srcalias "$KEY_ALIAS" \
              -destalias "$KEY_ALIAS" \
              -srckeypass "$KEY_PASSWORD" \
              -destkeypass "$KEY_PASSWORD" \
              -noprompt
          else
            mv android/app/keystore.src android/app/keystore.jks
          fi

          rm -f android/app/keystore.src
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=app/keystore.jks
          EOF
          if [ -n "$KEY_STORE_TYPE" ]; then
            echo "storeType=$KEY_STORE_TYPE" >> android/key.properties
          fi

      - name: Pub get
        run: flutter pub get

      - name: Prepare release notes
        run: dart run tool/release/release_prepare.dart --check --require-changelog --write-release-notes release_notes.md

      - name: Update README summary on main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          dart run tool/release/release_prepare.dart --apply --check
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md android/app/build.gradle.kts || true
            git commit -m "docs: update release summary for $GITHUB_REF_NAME" || true
            git push origin HEAD:main
          fi
          git checkout "$GITHUB_REF_NAME"

      - name: Build APK (arm64-v8a)
        run: flutter build apk --release --target-platform android-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: build/app/outputs/flutter-apk/app-release.apk
