name: Test WebDAV
on:
  push:
    paths:
      - 'test_webdav.dart'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install dependencies
        run: dart pub get
      - name: Run Test Script
        run: dart run test_webdav.dart
