name: Build VaultApp APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ACTIONS_STEP_DEBUG: true
      ACTIONS_RUNNER_DEBUG: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # 修复：从 openjdk-11 改为 openjdk-17，Gradle 9.x 要求 Java 17+
          sudo apt-get install -y \
            build-essential git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libssl-dev libffi-dev \
            libncurses5-dev libncursesw5-dev libtinfo-dev \
            cmake libsqlite3-dev libgmp-dev libmpc-dev libmpfr-dev
          # 确保 JAVA_HOME 指向 JDK 17
          echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/temurin-17-jdk-amd64/bin" >> $GITHUB_PATH

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Fix Android SDK Tool Paths
        run: |
          SDK=/usr/local/lib/android/sdk
          NEW_BIN=$SDK/cmdline-tools/latest/bin
          OLD_BIN=$SDK/tools/bin
          sudo mkdir -p $OLD_BIN
          sudo ln -sf $NEW_BIN/sdkmanager $OLD_BIN/sdkmanager
          sudo ln -sf $NEW_BIN/avdmanager $OLD_BIN/avdmanager
          echo "sdkmanager 版本：$($OLD_BIN/sdkmanager --version)"

      - name: Cache NDK r25b
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/.buildozer/android/platform/android-ndk-r25b
          key: android-ndk-r25b-linux-permanent

      - name: Download NDK r25b
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.buildozer/android/platform
          cd /tmp
          for i in 1 2 3; do
            wget -q --timeout=180 \
              "https://dl.google.com/android/repository/android-ndk-r25b-linux.zip" \
              -O ndk-r25b.zip && break
            echo "第 $i 次失败，等待 15 秒..."
            sleep 15
          done
          unzip -q ndk-r25b.zip -d ~/.buildozer/android/platform/
          rm ndk-r25b.zip
          echo "NDK r25b 就绪：$(ls ~/.buildozer/android/platform/android-ndk-r25b/)"

      - name: Pre-download libffi source
        run: |
          mkdir -p ~/.buildozer/android/packages
          cd ~/.buildozer/android/packages
          for i in 1 2 3 4 5; do
            wget -q --timeout=60 \
              "https://github.com/libffi/libffi/archive/v3.4.2.tar.gz" \
              -O "libffi-v3.4.2.tar.gz" && echo "libffi 下载成功" && break
            sleep 15
          done

      - name: Cache p4a Packages
        uses: actions/cache@v4
        with:
          path: ~/.buildozer/android/packages
          key: p4a-packages-libffi342-stable

      - name: Cache Buildozer Build
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-v8-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v8-

      - name: Build with Buildozer
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: 1
          P4A_RELEASE_KEYSTORE: my_release.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.KEY_ALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > my_release.keystore
          pip install --upgrade buildozer "Cython<3.0.0" virtualenv
          buildozer -v android release 2>&1 | tee build_log.txt
          exit ${PIPESTATUS[0]}

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failure
          path: build_log.txt

      - name: Upload P4A Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: p4a-log-failure
          path: .buildozer/android/platform/build-arm64-v8a/dists/vaultapp/build.log
          if-no-files-found: ignore

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VaultApp-Signed-APK
          path: bin/*.apk