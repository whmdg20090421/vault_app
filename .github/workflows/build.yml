name: Build VaultApp APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libssl-dev libffi-dev \
            libncurses5-dev libncursesw5-dev libtinfo-dev \
            cmake libsqlite3-dev libgmp-dev libmpc-dev libmpfr-dev
          echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache NDK & Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-v10-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v10-

      - name: Build with Buildozer
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: 1
          P4A_RELEASE_KEYSTORE: ${{ github.workspace }}/my_release.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.KEY_ALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # 1. 准备 Keystore
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > "${{ github.workspace }}/my_release.keystore"
          
          # 2. 安装必要工具
          pip install --upgrade buildozer "Cython<3.0.0" virtualenv
          
          # 3. 开始构建
          echo "::group::🚀 点击展开详细编译过程"
          buildozer -v android release 2>&1 | tee full_build_log.txt
          BUILD_STATUS=${PIPESTATUS[0]}
          echo "::endgroup::"
          
          # 4. 智能结果处理
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "::error::❌ 编译失败！以下是最后 100 行错误日志："
            tail -n 100 full_build_log.txt
            exit $BUILD_STATUS
          fi

      - name: Check bin directory
        if: always()
        run: |
          echo "==== 检查生成文件 ===="
          ls -R bin/ || echo "bin 目录为空"

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VaultApp-Packages
          # 彻底修复匹配规则：明确指定上传 apk 和 aab
          path: |
            bin/*.apk
            bin/*.aab
          if-no-files-found: error

      - name: Upload Full Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: full-build-log
          path: full_build_log.txt
