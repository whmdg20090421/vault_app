name: Build VaultApp APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libssl-dev libffi-dev \
            libncurses5-dev libncursesw5-dev libtinfo-dev \
            cmake libsqlite3-dev libgmp-dev libmpc-dev libmpfr-dev \
            libgl1-mesa-dev
          echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/temurin-17-jdk-amd64/bin" >> $GITHUB_PATH

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Fix Android SDK Tool Paths
        run: |
          SDK=/usr/local/lib/android/sdk
          NEW_BIN=$SDK/cmdline-tools/latest/bin
          OLD_BIN=$SDK/tools/bin
          sudo mkdir -p $OLD_BIN
          sudo ln -sf $NEW_BIN/sdkmanager $OLD_BIN/sdkmanager
          sudo ln -sf $NEW_BIN/avdmanager $OLD_BIN/avdmanager

      - name: Cache NDK r25b
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ~/.buildozer/android/platform/android-ndk-r25b
          key: android-ndk-r25b-permanent-v1

      - name: Download NDK r25b
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.buildozer/android/platform
          cd /tmp
          for i in 1 2 3; do
            wget -q --timeout=180 \
              "https://dl.google.com/android/repository/android-ndk-r25b-linux.zip" \
              -O ndk-r25b.zip && break
            echo "第 $i 次失败，15 秒后重试..."
            sleep 15
          done
          unzip -q ndk-r25b.zip -d ~/.buildozer/android/platform/
          rm ndk-r25b.zip
          echo "NDK r25b 就绪"

      - name: Cache Buildozer Build Output
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-build-arm64-v2-${{ hashFiles('buildozer.spec') }}

      - name: Purge x86_64 .so files from stale cache
        run: |
          echo "=== 扫描并清除 x86_64 .so 文件 ==="
          found=0
          while IFS= read -r f; do
            if file "$f" 2>/dev/null | grep -q "x86-64"; then
              echo "❌ 错误架构，删除: $f"
              rm "$f"
              found=$((found + 1))
            fi
          done < <(find .buildozer -name "*.so" -path "*/python-installs/*" 2>/dev/null)
          echo "共清除 $found 个 x86_64 .so 文件"

      - name: Build with Buildozer
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: 1
          P4A_RELEASE_KEYSTORE: ${{ github.workspace }}/my_release.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.KEY_ALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > "${{ github.workspace }}/my_release.keystore"
          pip install --upgrade buildozer "Cython<3.0.0" virtualenv

          echo "::group::🚀 点击展开详细编译过程"
          buildozer -v android release 2>&1 | tee full_build_log.txt
          BUILD_STATUS=${PIPESTATUS[0]}
          echo "::endgroup::"

          echo "=== 验证 .so 文件架构 ==="
          find .buildozer -name "_clock.so" 2>/dev/null | while read f; do
            file "$f"
          done

          if [ $BUILD_STATUS -ne 0 ]; then
            echo "::error::❌ 编译失败，BUILD_STATUS=$BUILD_STATUS"
            exit $BUILD_STATUS
          fi

      - name: debug_find
        if: failure()
        run: |
          if [ ! -f full_build_log.txt ]; then
            echo "::warning::full_build_log.txt 不存在，跳过 debug_find"
            exit 0
          fi

          echo "::group::🔍 debug_find — 关键报错摘要（无需下载）"

          echo ""
          echo "▼▼▼ fatal error（致命编译错误）▼▼▼"
          grep -n "fatal error" full_build_log.txt | head -30 || echo "（无 fatal error）"

          echo ""
          echo "▼▼▼ error: command ... failed（命令失败）▼▼▼"
          grep -n "error: command" full_build_log.txt | head -20 || echo "（无 command failed）"

          echo ""
          echo "▼▼▼ ERROR: Failed building wheel▼▼▼"
          grep -n "ERROR:.*wheel\|Failed to build\|failed-wheel" full_build_log.txt | head -20 || echo "（无 wheel 构建失败）"

          echo ""
          echo "▼▼▼ ImportError / ModuleNotFoundError▼▼▼"
          grep -n "ImportError\|ModuleNotFoundError" full_build_log.txt | head -20 || echo "（无此类错误）"

          echo ""
          echo "▼▼▼ 最后 50 行日志（兜底）▼▼▼"
          tail -n 50 full_build_log.txt

          echo "::endgroup::"

      - name: Check bin directory
        if: always()
        run: ls -R bin/ || echo "bin 目录为空"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VaultApp-APK
          path: bin/*.apk
          if-no-files-found: error